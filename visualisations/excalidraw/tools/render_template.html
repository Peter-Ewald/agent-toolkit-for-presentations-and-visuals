<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #ffffff; overflow: hidden; font-family: "NunitoCustom", Nunito, Verdana, "Segoe UI", sans-serif; }
    #root { display: inline-block; }
    #root svg { display: block; }
    #root svg text,
    #root svg tspan,
    #root svg foreignObject,
    #root svg foreignObject * {
      font-family: "NunitoCustom", Nunito, Verdana, "Segoe UI", sans-serif !important;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="module">
    import { exportToSvg } from "https://esm.sh/@excalidraw/excalidraw@0.18.1?bundle&deps=@braintree/sanitize-url@7.1.2";

    window.renderDiagram = async function(jsonData) {
      try {
        const data = typeof jsonData === "string" ? JSON.parse(jsonData) : jsonData;
        const elements = data.elements || [];
        const appState = data.appState || {};
        const files = data.files || {};

        appState.viewBackgroundColor = appState.viewBackgroundColor || "#ffffff";
        appState.exportWithDarkMode = false;

        const svg = await exportToSvg({
          elements: elements,
          appState: {
            ...appState,
            exportBackground: true,
          },
          files: files,
        });

        const root = document.getElementById("root");
        root.innerHTML = "";
        root.appendChild(svg);

        const fontFamily = '"NunitoCustom", Nunito, Verdana, "Segoe UI", sans-serif';
        svg.querySelectorAll("text, tspan, foreignObject, foreignObject *").forEach((node) => {
          node.style.fontFamily = fontFamily;
          node.setAttribute("font-family", fontFamily);
        });

        window.__renderComplete = true;
        window.__renderError = null;
        return { success: true, width: svg.getAttribute("width"), height: svg.getAttribute("height") };
      } catch (err) {
        window.__renderComplete = true;
        window.__renderError = err.message;
        return { success: false, error: err.message };
      }
    };

    window.__moduleReady = true;
  </script>
</body>
</html>
